<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient - tropical -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe4d6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- Bowl shadow -->
  <ellipse cx="600" cy="550" rx="260" ry="85" fill="rgba(0,0,0,0.12)"/>
  
  <!-- Premium bowl -->
  <ellipse cx="600" cy="450" rx="290" ry="210" fill="#f5e6d3"/>
  <path d="M 310 450 Q 310 620 600 670 Q 890 620 890 450" fill="#e8d4b8" stroke="#c4a67d" stroke-width="3"/>
  
  <!-- Bowl rim highlight -->
  <ellipse cx="600" cy="450" rx="280" ry="200" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="4"/>
  
  <!-- EXOTIC FRUITS -->
  <!-- Dragon Fruit (pink/magenta) -->
  <circle cx="420" cy="340" r="48" fill="#ff006e"/>
  <circle cx="435" cy="325" r="45" fill="#ff1493"/>
  <!-- Mango (orange/golden) -->
  <ellipse cx="600" cy="320" rx="55" ry="60" fill="#fdb750" transform="rotate(-20 600 320)"/>
  <ellipse cx="620" cy="305" rx="50" ry="55" fill="#ffcc00" transform="rotate(10 620 305)"/>
  <!-- Passion Fruit (dark purple) -->
  <circle cx="480" cy="460" r="42" fill="#6a0572"/>
  <circle cx="500" cy="445" r="40" fill="#8b1d9d"/>
  <!-- Papaya (orange/yellow) -->
  <ellipse cx="750" cy="380" rx="50" ry="58" fill="#ff8c42" transform="rotate(30 750 380)"/>
  <!-- Pineapple (yellow) -->
  <polygon points="850,300 880,340 850,380 820,340" fill="#ffd700" stroke="#daa520" stroke-width="2"/>
  <!-- Rambutan (red) -->
  <circle cx="580" cy="500" r="38" fill="#d32f2f"/>
  <circle cx="560" cy="520" r="35" fill="#c62828"/>
  <!-- Lychee (pink/red) -->
  <circle cx="720" cy="500" r="35" fill="#ff6b9d"/>
  <circle cx="735" cy="515" r="32" fill="#ff8fb3"/>
  <!-- Coconut (brown) -->
  <circle cx="450" cy="540" r="40" fill="#8b6914"/>
  <circle cx="465" cy="555" r="37" fill="#a0791a"/>
  
  <!-- Star fruit shape -->
  <g transform="translate(800, 480)">
    <polygon points="0,-40 12,-12 40,-12 20,8 28,38 0,20 -28,38 -20,8 -40,-12 -12,-12" fill="#ffeb3b" stroke="#f57f17" stroke-width="2"/>
  </g>
  
  <!-- Decorative tropical leaves -->
  <g opacity="0.6">
    <path d="M 300 280 Q 340 240 360 270 Q 350 300 320 310" fill="#27ae60"/>
    <path d="M 900 260 Q 860 230 840 280 Q 850 310 880 320" fill="#2ecc71"/>
    <path d="M 550 200 Q 580 170 610 200 Q 600 230 570 240" fill="#1abc9c"/>
  </g>
  
  <!-- Text -->
  <text x="600" y="750" font-family="Arial, sans-serif" font-size="52" font-weight="bold" text-anchor="middle" fill="#2c1810">
    Exotic Fruit Bowl
  </text>
  <text x="600" y="800" font-family="Arial, sans-serif" font-size="34" text-anchor="middle" fill="#6f4e37">
    Premium Tropical Selection
  </text>
</svg>
