<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e3d8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- Bowl shadow -->
  <ellipse cx="600" cy="550" rx="250" ry="80" fill="rgba(0,0,0,0.15)"/>
  
  <!-- Bowl -->
  <ellipse cx="600" cy="450" rx="280" ry="200" fill="#e8dcc8"/>
  <path d="M 320 450 Q 320 600 600 650 Q 880 600 880 450" fill="#d4c9b8" stroke="#b8a896" stroke-width="2"/>
  
  <!-- Bowl rim highlight -->
  <ellipse cx="600" cy="450" rx="270" ry="190" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
  
  <!-- Fresh fruits in bowl -->
  <!-- Apples (red) -->
  <circle cx="450" cy="380" r="45" fill="#d62828"/>
  <circle cx="480" cy="360" r="42" fill="#e74c3c"/>
  <!-- Bananas (yellow) -->
  <ellipse cx="620" cy="340" rx="50" ry="35" fill="#f39c12" transform="rotate(-25 620 340)"/>
  <ellipse cx="680" cy="355" rx="48" ry="33" fill="#f1c40f" transform="rotate(15 680 355)"/>
  <!-- Oranges (orange) -->
  <circle cx="520" cy="460" r="40" fill="#e67e22"/>
  <circle cx="720" cy="420" r="42" fill="#eb984e"/>
  <!-- Grapes (purple) -->
  <circle cx="750" cy="360" r="35" fill="#9b59b6"/>
  <circle cx="770" cy="390" r="33" fill="#af7ac5"/>
  <!-- Berries (mixed) -->
  <circle cx="580" cy="500" r="25" fill="#c0392b"/>
  <circle cx="650" cy="510" r="22" fill="#e74c3c"/>
  
  <!-- Leaves for decoration -->
  <g opacity="0.7">
    <path d="M 400 320 Q 420 280 440 300" stroke="#27ae60" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 800 300 Q 820 270 840 290" stroke="#2ecc71" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="600" y="750" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#333">
    Fresh Fruit Bowl
  </text>
  <text x="600" y="800" font-family="Arial, sans-serif" font-size="32" text-anchor="middle" fill="#666">
    Daily Nutrition
  </text>
</svg>
